<section class="why-section section-pad">
  <div class="container-custom">

    <div class="why-header reveal">
      <span class="section-label">Our Advantage</span>
      <h2 class="section-title">Why Choose <span>VoltZVital</span></h2>
    </div>

    <div class="why-grid">
      <div class="why-card reveal" [class]="'delay-' + (i+1)"
           *ngFor="let item of reasons; let i = index">
        <div class="why-icon" [style.color]="item.color">
          <span [innerHTML]="item.icon"></span>
        </div>
        <h4>{{ item.title }}</h4>
        <p>{{ item.desc }}</p>
      </div>
    </div>

    <div class="sv-block">
      <p class="sv-title">Our leaders measure success in <em>shared value</em></p>

      <div class="sv-row">
        <span class="sv-pill">
          <svg class="sv-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M13 2L4.5 13.5H11L10 22L19.5 9.5H13L13 2Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>
          </svg>
          Green energy
        </span>

        <span class="sv-pill">
          <svg class="sv-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 16c1.5-2 3-2 4.5 0s3 2 4.5 0 3-2 4.5 0 3 2 4.5 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 11c1.5-2 3-2 4.5 0s3 2 4.5 0 3-2 4.5 0 3 2 4.5 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
          </svg>
          Cleaner rivers
        </span>

        <span class="sv-pill">
          <svg class="sv-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 22V12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            <path d="M12 12C12 12 5 12 5 5C12 5 12 12 12 12Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>
            <path d="M12 16C12 16 19 16 19 9C12 9 12 16 12 16Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>
          </svg>
          Empowered farmers
        </span>

        <span class="sv-pill">
          <svg class="sv-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="8" width="18" height="12" rx="2" stroke="currentColor" stroke-width="1.6"/>
            <path d="M8 8V6a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            <path d="M3 13h18" stroke="currentColor" stroke-width="1.6"/>
          </svg>
          Job creation
        </span>
      </div>

      <div class="sv-row">
        <span class="sv-pill">
          <svg class="sv-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 20.5C12 20.5 3.5 15.5 3.5 9.3C3.5 6.4 5.7 4.5 8.2 4.5C9.9 4.5 11.2 5.3 12 6.6C12.8 5.3 14.1 4.5 15.8 4.5C18.3 4.5 20.5 6.4 20.5 9.3C20.5 15.5 12 20.5 12 20.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
          </svg>
          Improved public health
        </span>

        <span class="sv-pill">
          <svg class="sv-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 12L7 8L10 11L14 7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M10 7H14V11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M14 13L18 17L21 14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="7" cy="17" r="2.2" stroke="currentColor" stroke-width="1.6"/>
            <circle cx="17" cy="17" r="2.2" stroke="currentColor" stroke-width="1.6"/>
          </svg>
          Enhanced community wellbeing
        </span>
      </div>
    </div>

  </div>
</section>
