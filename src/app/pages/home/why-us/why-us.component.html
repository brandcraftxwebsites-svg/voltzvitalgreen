<section class="why-section section-pad">
  <div class="container-custom">

    <div class="why-header reveal">
      <span class="section-label">Our Advantage</span>
      <h2 class="section-title">Why Choose <span>VoltZVital</span></h2>
    </div>

    <div class="why-grid">
      <div class="why-card reveal" [class]="'delay-' + (i+1)"
           *ngFor="let item of reasons; let i = index">
        <div class="why-icon" [style.color]="item.color">
          <span [innerHTML]="item.icon"></span>
        </div>
        <h4>{{ item.title }}</h4>
        <p>{{ item.desc }}</p>
      </div>
    </div>

   <div class="sv-block">
  <p class="sv-title">Our leaders measure success in <em>shared value</em></p>
  <div class="sv-row">
    <span class="sv-pill"><span class="sv-icon">⚡</span>Green energy</span>
    <span class="sv-pill"><span class="sv-icon">〰️</span>Cleaner rivers</span>
    <span class="sv-pill"><span class="sv-icon">🌱</span>Empowered farmers</span>
    <span class="sv-pill"><span class="sv-icon">💼</span>Job creation</span>
  </div>
  <div class="sv-row">
    <span class="sv-pill"><span class="sv-icon">❤️</span>Improved public health</span>
    <span class="sv-pill"><span class="sv-icon">🤝</span>Enhanced community wellbeing</span>
  </div>
</div>
  </div>
</section>
