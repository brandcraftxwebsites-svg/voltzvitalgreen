<section id="hero" class="vz-hero">

  <!-- ── BACKGROUND ── -->
  <div class="vz-bg">
      <img
    src="assets/images/green-energy-overlay.png"

    class="vz-bg-image"

  <!-- ── MAIN CONTENT ── -->
  <div class="vz-wrap">
    <div class="vz-inner">

      <!-- LEFT -->
      <div class="vz-left">

        <div class="vz-top-logo reveal delay-1">
          <img src="assets/images/logo.png" alt="VoltZVital Logo">
        </div>

        <h1 class="vz-headline reveal delay-2">
          Building a<br>
          <span class="vz-grad">Sustainable</span><br>
          Tomorrow

        <p class="vz-desc reveal delay-3">
          Strategic environmental consulting that bridges innovation
          with responsibility — empowering industries across India
          to operate smarter, cleaner, and more efficiently.
        </p>

        <div class="vz-actions reveal delay-3">
          <a href="#sectors" class="vz-btn-primary" (click)="scrollTo($event,'#sectors')">
            Explore Our Services
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M5 12h14M12 5l7 7-7 7" />
            </svg>
          </a>
          <a href="#contact" class="vz-btn-outline" (click)="scrollTo($event,'#contact')">
            Let's Talk
          </a>
        </div>

        <div class="vz-stats reveal delay-4">

          <div class="vz-stat">
            <div class="vz-stat-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="18" rx="2" />
                <line x1="16" y1="2" x2="16" y2="6" />
                <line x1="8" y1="2" x2="8" y2="6" />
                <line x1="3" y1="10" x2="21" y2="10" />
              </svg>
            </div>
            <div class="vz-stat-body">
              <span class="vz-stat-val">2026</span>
              <span class="vz-stat-lbl">Est.</span>
            </div>
          </div>

          <div class="vz-stat-divider"></div>

          <div class="vz-stat">
            <div class="vz-stat-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z" />
                <circle cx="12" cy="10" r="3" />
              </svg>
            </div>
            <div class="vz-stat-body">
              <span class="vz-stat-val">KL</span>
              <span class="vz-stat-lbl">Based in Kerala</span>
            </div>
          </div>

          <div class="vz-stat-divider"></div>

          <div class="vz-stat">
            <div class="vz-stat-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7" />
                <rect x="14" y="3" width="7" height="7" />
                <rect x="14" y="14" width="7" height="7" />
                <rect x="3" y="14" width="7" height="7" />
              </svg>
            </div>
            <div class="vz-stat-body">
              <span class="vz-stat-val">PAN</span>
              <span class="vz-stat-lbl">India Operations</span>
            </div>
          </div>

        </div>
