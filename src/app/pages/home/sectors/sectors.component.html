<section id="sectors" class="sectors-section section-pad">
    <div class="container-custom">

        <div class="sectors-header reveal">
            <span class="section-label">What We Do</span>
            <h2 class="section-title">Industries &amp; <span>Sectors We Serve</span></h2>
            <p class="section-sub">
                Delivering tailored environmental and sustainability consulting across diverse
                industries — from compliance and energy planning to urban infrastructure.
            </p>
        </div>

        <div class="sectors-grid">
            <div class="sector-card reveal" [class]="'delay-' + (i+1)" *ngFor="let sector of sectors; let i = index">
                <div class="sector-icon" [style.background]="sector.gradient">
                    <span [innerHTML]="sector.icon"></span>
                </div>
                <div class="sector-body">
                    <h3>{{ sector.title }}</h3>
                    <p>{{ sector.desc }}</p>
                </div>
                <div class="sector-arrow">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7" />
                    </svg>
                </div>
            </div>
        </div>

    </div>
</section>
