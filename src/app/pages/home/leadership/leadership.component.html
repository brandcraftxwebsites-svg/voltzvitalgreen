<section id="leadership" class="leadership-section section-pad">
  <div class="container-custom">

    <div class="leadership-header reveal">
      <span class="section-label">The Founders</span>
      <h2 class="section-title">Leadership <span>Team</span></h2>
      <p class="section-sub">
        Guided by experienced leaders who bring together strategic vision and
        operational expertise to steer VoltZVital towards sustainable excellence.
      </p>
    </div>

    <div class="leaders-grid">

      <div class="leader-card reveal delay-1" *ngFor="let leader of leaders">
        <div class="leader-visual">
          <div class="avatar-ring">
            <div class="avatar-inner">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </div>
          </div>
          <div class="designation-badge">{{ leader.designation }}</div>
        </div>

        <div class="leader-info">
          <h3>{{ leader.name }}</h3>
          <span class="leader-role">{{ leader.designation }}</span>
          <p class="leader-bio">{{ leader.bio }}</p>

          <div class="leader-tags">
            <span class="tag" *ngFor="let tag of leader.tags">{{ tag }}</span>
          </div>
        </div>
      </div>

    </div>

  </div>
</section>
